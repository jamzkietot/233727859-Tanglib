<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baguio Tourist Spots | Jeepney Guide</title>

<style>
/* GLOBAL DESIGN */
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #f6f3ea;
    color: #2c2c2c;
}

header {
    background: #145532;
    color: #fff;
    padding: 14px 45px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
}

nav a {
    color: white;
    margin-left: 25px;
    font-weight: 500;
    text-decoration: none;
}

nav a.active,
nav a:hover {
    color: #f2d7b5;
}

/* MAIN */
main {
    max-width: 1150px;
    margin: 25px auto;
    padding: 0 18px;
}

/* TITLES */
.title {
    font-size: 34px;
    font-weight: 700;
    color: #154d2e;
    margin-bottom: 5px;
}
.subtitle {
    font-size: 15px;
    color: #666;
    margin-top: -5px;
}

/* CARD STYLE — MATCHING YOUR SAMPLE */
.card {
    margin-top: 30px;
    padding: 22px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.card h3 {
    margin-top: 0;
    font-size: 20px;
    color: #154d2e;
}

.card p {
    margin: 6px 0;
    font-size: 15px;
}

.map-container {
    margin-top: 15px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 18px;
    background: #145532;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}
.btn:hover {
    background: #1e7445;
}

</style>

</head>
<body>

<!-- HEADER -->
<header>
  <h2>Baguio Track</h2>
  <nav>
    <a href="home.html">Home</a>
    <a href="tourist.html">Tourist Spots</a>
    <a href="#">Terminals</a>
  </nav>
</header>

<main>

    <h1 class="title">Jeepney Terminals & Routes</h1>
    <p class="subtitle">Navigate Baguio's top destinations using local jeepneys.</p>

    <div id="guide-container"></div>

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const touristSpots = {
        "Mines View Park": {
            jeep_route: "Mines View Jeepney",
            terminal: "F. Calderon Street (near Session Road / Landbank)",
            maps: "F+Calderon+Street+Baguio",
            notes: "Also passes Botanical Garden, The Mansion, and Wright Park.",
            fare: "Approx. ₱15"
        },
        "Botanical Garden": {
            jeep_route: "Mines View Jeepney",
            terminal: "F. Calderon Street (near Session Road / Landbank)",
            maps: "F+Calderon+Street+Baguio",
            notes: "Ask driver to drop you at the Botanical Garden entrance.",
            fare: "Approx. ₱15"
        },
        "The Mansion": {
            jeep_route: "Mines View Jeepney",
            terminal: "F. Calderon Street (near Session Road / Landbank)",
            maps: "F+Calderon+Street+Baguio",
            notes: "Get off at Wright Park.",
            fare: "Approx. ₱15"
        },
        "Camp John Hay": {
            jeep_route: "Scout Barrio or Loakan Jeepney",
            terminal: "East side of Burnham Park (Harrison Road)",
            maps: "Harrison+Road+Baguio",
            notes: "Jeep drops you at the John Hay gate.",
            fare: "Approx. ₱13"
        },
        "Lourdes Grotto": {
            jeep_route: "Dominican Hill / Lourdes Jeepney",
            terminal: "Kayang Street (near Baguio Market)",
            maps: "Kayang+Street+Baguio",
            notes: "Drop-off is at the foot of the grotto stairs.",
            fare: "Starts at ₱13"
        },
        "Mirador Heritage Park": {
            jeep_route: "Dominican Hill / Lourdes Jeepney",
            terminal: "Kayang Street (near Baguio Market)",
            maps: "Kayang+Street+Baguio",
            notes: "A short walk from Lourdes Grotto.",
            fare: "Starts at ₱13"
        },
        "Good Shepherd Convent": {
            jeep_route: "Mines View Jeepney",
            terminal: "F. Calderon Street",
            maps: "F+Calderon+Street+Baguio",
            notes: "A short walk from Mines View Park.",
            fare: "Approx. ₱15"
        },
    };

    const container = document.getElementById("guide-container");

    for (const spot in touristSpots) {
        const info = touristSpots[spot];

        const card = document.createElement("div");
        card.classList.add("card");

        if (info.jeep_route.includes("None")) {
            card.classList.add("no-jeep");
        }

        // BUILD MAP URL
        let mapsUrl = "#";
        if (info.maps !== "") {
            mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${info.maps}`;
        }

        card.innerHTML = `
            <h3>📍 ${spot}</h3>
            <p><strong>Jeep Route:</strong> ${info.jeep_route}</p>
            <p><strong>Terminal:</strong> ${info.terminal}</p>
            <p><strong>Fare:</strong> ${info.fare}</p>
            <p><strong>Notes:</strong> ${info.notes}</p>

            <a class="btn" 
               href="${mapsUrl}" 
               target="_blank" 
               ${info.maps === "" ? "style='pointer-events:none;opacity:0.5;'" : ""}>
               View Route to Terminal
            </a>
        `;

        container.appendChild(card);
    }
});
</script>


</body>
</html>
